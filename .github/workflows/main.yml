name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build with Maven
        working-directory: characters
        run: mvn clean verify

      - name: SonarCloud Scan
        working-directory: characters
        run: mvn sonar:sonar -Dsonar.projectKey=2f46dcb51bc38bd3ac86b5cb1fe62bdc48e0d1a4 -Dsonar.organization=antaine -Dsonar.host.url=https://sonarcloud.io
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Build Docker image
        run: docker build -t characters-app ./characters

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: characters-jar
          path: characters/target/*.jar
